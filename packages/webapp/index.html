<!doctype html>
<html translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/images/icon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/src/images/icon-192.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="512x512"
      href="/src/images/icon-512.png"
    />
    <link rel="manifest" href="/src/manifest.json" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Rolebase</title>

    <!-- Umami Analytics (production only) -->
    <script>
      if (location.hostname === 'rolebase.io') {
        var s = document.createElement('script')
        s.defer = true
        s.src = 'https://umami.internal.lonestone.io/script.js'
        s.dataset.websiteId = 'bd9370b9-340a-41e4-b25f-e865fb445c63'
        document.head.appendChild(s)
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Background during loading -->
    <script type="text/javascript">
      const mode = localStorage.getItem('chakra-ui-color-mode')
      if (mode) {
        const css = `
          body {
            background-color: ${
              mode === 'dark' ? 'hsl(31.3, 12.7%, 9%)' : 'white'
            };
          }
        `
        const style = document.createElement('style')
        if (style.styleSheet) {
          style.styleSheet.cssText = css
        } else {
          style.appendChild(document.createTextNode(css))
        }
        document.head.appendChild(style)
      }
    </script>

    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
