[build]
  command = "npm run build"
  publish = "dist"

# Redirect root to browser language
[[redirects]]
  from = "/"
  to = "/fr"
  status = 302
  conditions = { Language = ["fr"] }

[[redirects]]
  from = "/"
  to = "/en"
  status = 302

# Glossary: /glossaire-rbm/:slug → /fr/glossary/:slug
[[redirects]]
  from = "/glossaire-rbm/:slug"
  to = "/fr/glossary/:slug"
  status = 301

